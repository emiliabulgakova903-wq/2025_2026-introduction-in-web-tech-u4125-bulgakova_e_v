site_name: "Емилия | Digital Portfolio"
site_author: "Емилия"

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.expand
    - navigation.hide
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - animation.enter
    - animation.show
  palette: 
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Ночной режим
    - scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Дневной режим
  font:
    text: Inter
    code: Roboto Mono
  icon:
    logo: material/clover

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - admonition
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg

nav:
  - Главная: index.md
  - Проекты: projects.md
  - Обо мне: about.md
  - Контакты: contacts.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/emiliabulgakova903-wq/2025_2026-introduction-in-web-tech-U4125-bulgakova_e_v
    - icon: fontawesome/brands/telegram
      link: https://t.me/milyaabul
    - icon: fontawesome/solid/paper-plane
      link: mailto:bulgakovaemilia02@yandex.ru

copyright: 'Copyright &copy; 2026 Булгакова Емилия'